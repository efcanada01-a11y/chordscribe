<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chordscribe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%); }
        .logo-guitar { font-size: 3.8rem; filter: drop-shadow(0 0 20px #34d399); }
        .chord { color: #fbbf24; font-weight: 800; font-size: 1.45rem; }
        .emerald-btn {
            background: linear-gradient(145deg, #10b981, #059669);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
            transition: all 0.2s ease;
        }
        .emerald-btn:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-5xl mx-auto p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <span class="logo-guitar">🎸</span>
                <h1 class="text-7xl font-bold tracking-tighter bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">Chordscribe</h1>
            </div>
            <button onclick="showAuthModal()" class="emerald-btn px-8 py-3 rounded-3xl font-semibold flex items-center gap-2">
                <i class="fa-solid fa-user"></i> Account
            </button>
        </div>

        <p class="text-center text-emerald-300 text-2xl mb-16">Upload any song • Get lyrics, chords, MIDI & stems</p>

        <!-- Pricing + Free Trial -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-20">
            <div class="bg-zinc-900/80 backdrop-blur rounded-3xl p-8 text-center border-2 border-emerald-400">
                <h3 class="text-2xl font-semibold text-emerald-400">FREE TRIAL</h3>
                <p class="text-5xl font-bold my-6">2 Free Uses</p>
                <p class="text-sm text-zinc-400 mb-6">No card required</p>
                <button onclick="startFreeTrial()" class="emerald-btn w-full py-5 rounded-3xl text-xl font-semibold">Start Free Trial</button>
            </div>

            <div class="bg-zinc-900/80 backdrop-blur rounded-3xl p-8 text-center border border-zinc-700">
                <h3 class="text-2xl font-semibold">$5 Credit Pack</h3>
                <p class="text-6xl font-bold my-6 text-emerald-400">5 uses</p>
                <button onclick="contactForPayment()" class="emerald-btn w-full py-5 rounded-3xl text-xl font-semibold">Buy $5 Pack</button>
            </div>

            <div class="bg-zinc-900/80 backdrop-blur rounded-3xl p-8 text-center border-2 border-emerald-500 relative">
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-emerald-500 text-xs px-6 py-1 rounded-full font-medium">MOST POPULAR</div>
                <h3 class="text-2xl font-semibold">$9.99 / month</h3>
                <p class="text-emerald-400 mt-2">Unlimited</p>
                <button onclick="contactForPayment()" class="emerald-btn w-full mt-8 py-5 rounded-3xl text-xl font-semibold">Subscribe Monthly</button>
            </div>

            <div class="bg-zinc-900/80 backdrop-blur rounded-3xl p-8 text-center border border-zinc-700">
                <h3 class="text-2xl font-semibold">$49 Lifetime</h3>
                <button onclick="contactForPayment()" class="emerald-btn w-full mt-16 py-5 rounded-3xl text-xl font-semibold">Buy Lifetime</button>
            </div>
        </div>

        <!-- Upload Section - HIDDEN until Free Trial or Login -->
        <div id="upload-section" class="hidden">
