<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chordscribe - Payment Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.paddle.com/paddle/paddle.js"></script>
</head>
<body class="bg-zinc-950 text-white p-8">
    <div class="max-w-md mx-auto">
        <h1 class="text-4xl font-bold text-center mb-8">🎸 Chordscribe Payment Test</h1>

        <div class="space-y-6">
            <button onclick="testPayment('credit_pack')" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 py-6 rounded-3xl text-xl font-semibold">
                Test $5 Credit Pack
            </button>

            <button onclick="testPayment('monthly')" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 py-6 rounded-3xl text-xl font-semibold">
                Test Monthly Subscription
            </button>

            <button onclick="testPayment('lifetime')" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 py-6 rounded-3xl text-xl font-semibold">
                Test $49 Lifetime
            </button>
        </div>

        <div class="mt-12 text-center text-sm text-zinc-400">
            <p>Your token: test_614de31ad349f9ea66c253d0225</p>
            <p>Product IDs are already set</p>
        </div>
    </div>

    <script>
        // Your exact token
        Paddle.Setup({ token: "test_614de31ad349f9ea66c253d0225" });

        function testPayment(plan) {
            let productId = "";
            if (plan === "credit_pack") productId = "pro_01kp2wzfnhpty5mv15d96gqvxb";
            if (plan === "monthly") productId = "pro_01kp2x0s0tjs10k67epcwvjcs5";
            if (plan === "lifetime") productId = "pro_01kp2x1xj0w4tzhw4pfdye2ftn";

            console.log("Opening Paddle checkout for product:", productId);

            Paddle.Checkout.open({
                product: productId,
                email: "test@chordscribe.com",
                successCallback: function(data) {
                    console.log("Success:", data);
                    alert("✅ Payment Successful!\n\nYour account has been updated.");
                },
                errorCallback: function(err) {
                    console.error("Paddle Error:", err);
                    alert("Payment Error:\n" + JSON.stringify(err, null, 2));
                }
            });
        }
    </script>
</body>
</html>
